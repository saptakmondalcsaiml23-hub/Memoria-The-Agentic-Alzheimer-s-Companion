apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-gateway-to-services
  namespace: memoria
spec:
  podSelector:
    matchExpressions:
      - key: app
        operator: In
        values:
          - telemetry-service
          - orchestrator-service
          - identity-service
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: gateway-service
      ports:
        - protocol: TCP
          port: 8081
        - protocol: TCP
          port: 8082
        - protocol: TCP
          port: 8083
  policyTypes:
    - Ingress
