server:
  port: 8083

spring:
  application:
    name: identity-service
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:memoria}
    username: ${POSTGRES_USER:memoria}
    password: ${POSTGRES_PASSWORD:memoria}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${JWT_ISSUER_URI:http://localhost:8084/realms/memoria}

memoria:
  security:
    admin-authority: ROLE_ADMIN
    caregiver-authority: ROLE_CAREGIVER

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
