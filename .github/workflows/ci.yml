name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Verify Docker
        run: docker version

      - name: Smoke test notification payload helper
        run: |
          chmod +x scripts/send-webhook-notification.sh
          bash -n scripts/send-webhook-notification.sh
          DRY_RUN=1 MESSAGE=$'ci notification smoke test\nrepo: ${{ github.repository }}' \
            ./scripts/send-webhook-notification.sh | grep -q '"text"'

      - name: Run Unit and Integration Tests
        run: mvn -B clean test

      - name: Upload Surefire Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: |
            **/target/surefire-reports/*
