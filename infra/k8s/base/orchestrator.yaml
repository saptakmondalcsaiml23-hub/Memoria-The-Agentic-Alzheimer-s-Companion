apiVersion: apps/v1
kind: Deployment
metadata:
  name: orchestrator-service
  namespace: memoria
spec:
  replicas: 3
  selector:
    matchLabels:
      app: orchestrator-service
  template:
    metadata:
      labels:
        app: orchestrator-service
    spec:
      containers:
        - name: orchestrator-service
          image: memoria/orchestrator-service:0.1.0
          ports:
            - containerPort: 8082
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8082
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: orchestrator-service
  namespace: memoria
spec:
  selector:
    app: orchestrator-service
  ports:
    - port: 8082
      targetPort: 8082
      protocol: TCP
