server:
  port: 8081

spring:
  application:
    name: telemetry-service
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:memoria}
    username: ${POSTGRES_USER:memoria}
    password: ${POSTGRES_PASSWORD:memoria}
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
    locations: classpath:db/migration
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: telemetry-aggregation
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer

memoria:
  kafka:
    sensor-topic: sensor_events

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
