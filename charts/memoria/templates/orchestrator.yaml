apiVersion: apps/v1
kind: Deployment
metadata:
  name: orchestrator-service
  namespace: {{ .Values.namespace }}
  labels:
    app: orchestrator-service
    {{- include "memoria.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicas.orchestrator }}
  selector:
    matchLabels:
      app: orchestrator-service
  template:
    metadata:
      labels:
        app: orchestrator-service
        {{- include "memoria.labels" . | nindent 8 }}
    spec:
      containers:
      - name: orchestrator-service
        image: {{ .Values.images.orchestrator }}
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: {{ .Values.service.orchestrator.port }}
        env:
        - name: SPRING_KAFKA_BOOTSTRAP_SERVERS
          value: {{ .Values.env.KAFKA_BOOTSTRAP_SERVERS | quote }}
        - name: SPRING_DATASOURCE_URL
          value: jdbc:postgresql://{{ .Values.env.POSTGRES_HOST }}:{{ .Values.env.POSTGRES_PORT }}/{{ .Values.env.POSTGRES_DB }}
        - name: SPRING_DATASOURCE_USERNAME
          value: {{ .Values.env.POSTGRES_USER | quote }}
        - name: SPRING_DATASOURCE_PASSWORD
          value: {{ .Values.env.POSTGRES_PASSWORD | quote }}
        resources:
          {{- toYaml .Values.resources.default | nindent 10 }}
---
apiVersion: v1
kind: Service
metadata:
  name: orchestrator-service
  namespace: {{ .Values.namespace }}
  labels:
    app: orchestrator-service
    {{- include "memoria.labels" . | nindent 4 }}
spec:
  selector:
    app: orchestrator-service
  ports:
  - name: http
    port: {{ .Values.service.orchestrator.port }}
    targetPort: {{ .Values.service.orchestrator.port }}
