apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway-service
  namespace: memoria
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gateway-service
  template:
    metadata:
      labels:
        app: gateway-service
    spec:
      containers:
        - name: gateway-service
          image: memoria/gateway-service:0.1.0
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: gateway-service
  namespace: memoria
spec:
  selector:
    app: gateway-service
  ports:
    - port: 80
      targetPort: 8080
      protocol: TCP
