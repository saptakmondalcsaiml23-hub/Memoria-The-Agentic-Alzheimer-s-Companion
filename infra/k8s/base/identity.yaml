apiVersion: apps/v1
kind: Deployment
metadata:
  name: identity-service
  namespace: memoria
spec:
  replicas: 2
  selector:
    matchLabels:
      app: identity-service
  template:
    metadata:
      labels:
        app: identity-service
    spec:
      containers:
        - name: identity-service
          image: memoria/identity-service:0.1.0
          ports:
            - containerPort: 8083
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8083
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: identity-service
  namespace: memoria
spec:
  selector:
    app: identity-service
  ports:
    - port: 8083
      targetPort: 8083
      protocol: TCP
