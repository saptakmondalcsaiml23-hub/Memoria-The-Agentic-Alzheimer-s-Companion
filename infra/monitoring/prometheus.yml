global:
  scrape_interval: 15s

scrape_configs:
  - job_name: gateway-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["gateway-service:8080"]

  - job_name: telemetry-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["telemetry-service:8081"]

  - job_name: orchestrator-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["orchestrator-service:8082"]

  - job_name: identity-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["identity-service:8083"]
